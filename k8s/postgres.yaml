apiVersion: v1
kind: Secret
metadata:
  name: lab-db
  namespace: lab
type: Opaque
stringData:
  POSTGRES_USER: app
  POSTGRES_PASSWORD: lab-secret-change-me
  POSTGRES_DB: itemsdb
  DATABASE_URL: postgresql://app:lab-secret-change-me@postgres:5432/itemsdb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: lab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: lab-db
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "app", "-d", "itemsdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lab
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
